<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime | Sahil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for that site feel */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#0b0e14] text-gray-200 font-sans min-h-screen">

    <nav class="border-b border-gray-800 px-6 py-4 flex justify-between items-center bg-[#0f1219]">
        <div class="text-2xl font-black text-indigo-500 tracking-tighter">ANIME<span class="text-white">SAHIL</span></div>
        <div class="space-x-6 text-sm font-medium hidden md:block">
            <a href="#" class="hover:text-indigo-400 transition">Movies</a>
            <a href="#" class="hover:text-indigo-400 transition">Series</a>
            <a href="#" class="hover:text-indigo-400 transition">Popular</a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto flex flex-col items-center py-12 px-4">
        
        <h1 class="text-4xl md:text-6xl font-black text-center mb-4 leading-tight">
            Watch <span class="text-indigo-500">Latest</span> Anime <br> 
            Directly on Telegram
        </h1>
        
        <p class="text-gray-400 text-center mb-8 max-w-lg">
            Join our community to get instant updates on the newest episodes and high-quality movie releases.
        </p>

        <button id="btn" class="group relative px-8 py-3 font-bold text-white transition-all duration-300">
            <span class="absolute inset-0 w-full h-full bg-indigo-600 rounded-lg group-hover:bg-indigo-500 shadow-[0_0_20px_rgba(79,70,229,0.4)]"></span>
            <span class="relative" id="btn">Join Channel</span>
        </button>

        <div class="mt-16 w-full max-w-sm">
            <div class="bg-[#161b22] rounded-2xl overflow-hidden border border-gray-800 shadow-2xl">
                <div class="relative overflow-hidden group">
                    <img src="download.jpg" alt="Jujutsu Kaisen Official Poster" class="w-full h-[450px] object-cover transition-transform duration-500 group-hover:scale-110">
                    <div class="absolute top-3 left-3 bg-indigo-600 text-[10px] font-bold px-2 py-1 rounded">
                        HD 1080P
                    </div>
                </div>

                <div class="p-6">
                    <h2 class="text-xl font-bold mb-1 text-white">Latest Update</h2>
                    <p class="text-sm text-gray-500 mb-6">Click below to start your high-speed download.</p>
                    
                    <button onclick="log()" 
                            class="w-full bg-white text-black font-black py-3 rounded-md hover:bg-indigo-500 hover:text-white transition-all duration-300 flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                        </svg>
                        DOWNLOAD NOW
                    </button>
                </div>
            </div>
        </div>

    </main>

    <footer class="mt-12 py-8 border-t border-gray-900 text-center text-gray-600 text-xs">
        &copy; 2024 AnimeSahil - Private Community
    </footer>

    <script>
        let data = null;
    async function check() {
        let res = await fetch('/api');
        data = await res.json();
    }
    check();
    async function log() {
        if(!data) return;
        window.open(data.download, "_blank")
    };
    let btn = document.getElementById('btn');
    btn.addEventListener("click", () => {
        window.open(data.link , "_blank")
    });
    </script>
</body>
</html>
